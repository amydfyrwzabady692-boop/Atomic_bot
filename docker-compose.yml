services:
  db:
    image: postgres:15-alpine
    container_name: atomic_bot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-accshop}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - atomic_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # فقط داخل شبکه ربات — به tasino دست نمی‌زند
    expose:
      - "5432"
    networks:
      - botnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-accshop}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    container_name: atomic_bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-accshop}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      ZARINPAL_MERCHANT_ID: ${ZARINPAL_MERCHANT_ID:-}
      ZARINPAL_SANDBOX: ${ZARINPAL_SANDBOX:-0}
      G2BULK_API_KEY: ${G2BULK_API_KEY:-}
      G2BULK_GAME_CODE: ${G2BULK_GAME_CODE:-freefire_me}
      CARD_TRANSFER_NUMBER: ${CARD_TRANSFER_NUMBER:-}
      CARD_TRANSFER_HOLDER: ${CARD_TRANSFER_HOLDER:-}
      CARD_TRANSFER_BANK: ${CARD_TRANSFER_BANK:-سامان}
      CARD_NUMBER: ${CARD_NUMBER:-}
      CARD_HOLDER: ${CARD_HOLDER:-}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID:-}
      BOT_DOMAIN: ${BOT_DOMAIN:-botatomic.atomicshop.ir}
      PAYMENT_CALLBACK_BASE: ${PAYMENT_CALLBACK_BASE:-https://botatomic.atomicshop.ir}
      WEB_PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - botnet
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  # Caddy خاموش — روی این وی‌پی‌اس nginx مشترک پورت 80 را دارد
  proxy:
    image: caddy:2
    profiles: ["caddy"]
    container_name: atomic_bot_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      BOT_DOMAIN: ${BOT_DOMAIN:-botatomic.atomicshop.ir}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - bot
    networks:
      - botnet

networks:
  botnet:

volumes:
  atomic_pgdata:
  caddy_data:
  caddy_config:
